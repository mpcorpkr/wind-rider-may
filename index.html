<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>바람의 라이더 5월 라이딩 챌린지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #131829;
    --accent-cyan: #00f0ff;
    --accent-yellow: #ffd400;
    --accent-pink: #ff2d6f;
    --accent-green: #00ff88;
    --text-primary: #ffffff;
    --text-secondary: #8a93b8;
    --border: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    background-image: 
      radial-gradient(circle at 20% 10%, rgba(0,240,255,0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(255,45,111,0.08) 0%, transparent 40%);
  }

  /* 노이즈 텍스처 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><filter id='n'><feTurbulence baseFrequency='0.9'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/></svg>");
    pointer-events: none;
    z-index: 1;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 100px;
    position: relative;
    z-index: 2;
  }

  /* 헤더 */
  .header {
    margin-bottom: 24px;
    text-align: center;
    position: relative;
  }

  .header-tag {
    display: inline-block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--accent-cyan);
    background: rgba(0,240,255,0.1);
    border: 1px solid rgba(0,240,255,0.3);
    padding: 4px 12px;
    border-radius: 4px;
    margin-bottom: 12px;
  }

  .header h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 36px;
    line-height: 1;
    letter-spacing: -1px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fff 0%, var(--accent-cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header h2 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    color: var(--accent-yellow);
    letter-spacing: 1px;
  }

  .header-deco {
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-pink), transparent);
    margin: 16px 0 0;
    border-radius: 2px;
  }

  /* 탭 */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    background: var(--bg-secondary);
    padding: 4px;
    border-radius: 12px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }

  .tab {
    padding: 12px;
    text-align: center;
    font-weight: 700;
    font-size: 14px;
    color: var(--text-secondary);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    border: none;
    font-family: inherit;
  }

  .tab.active {
    background: linear-gradient(135deg, var(--accent-cyan), #0099ff);
    color: #001220;
    box-shadow: 0 4px 12px rgba(0,240,255,0.3);
  }

  /* 카드 */
  .card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .card-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 18px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.5px;
  }

  .card-title::before {
    content: '';
    width: 4px;
    height: 18px;
    background: var(--accent-cyan);
    border-radius: 2px;
  }

  /* 입력 */
  .input-group {
    margin-bottom: 16px;
  }

  .input-label {
    font-size: 12px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    display: block;
    font-weight: 700;
  }

  .text-input {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg-primary);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text-primary);
    font-size: 16px;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  .text-input:focus {
    outline: none;
    border-color: var(--accent-cyan);
  }

  .text-input::placeholder {
    color: var(--text-secondary);
  }

  /* 점수 버튼 그리드 */
  .score-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .score-btn {
    background: var(--bg-primary);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    font-family: inherit;
    color: inherit;
    position: relative;
    overflow: hidden;
  }

  .score-btn:active {
    transform: scale(0.97);
  }

  .score-btn.selected {
    border-color: var(--accent-cyan);
    background: linear-gradient(135deg, rgba(0,240,255,0.15), rgba(0,240,255,0.05));
    box-shadow: 0 0 20px rgba(0,240,255,0.2);
  }

  .score-btn.selected::after {
    content: '✓';
    position: absolute;
    top: 8px;
    right: 10px;
    color: var(--accent-cyan);
    font-weight: 900;
    font-size: 18px;
  }

  .score-btn-name {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 18px;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }

  .score-btn-desc {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .score-btn-points {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--accent-yellow);
    letter-spacing: 1px;
  }

  /* 날짜 */
  .date-input {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg-primary);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text-primary);
    font-size: 16px;
    font-family: inherit;
    color-scheme: dark;
  }

  /* 제출 버튼 */
  .submit-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent-pink), #ff5500);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 8px 24px rgba(255,45,111,0.3);
    position: relative;
    overflow: hidden;
  }

  .submit-btn:active {
    transform: scale(0.98);
  }

  .submit-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* 상태 메시지 */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--bg-secondary);
    border: 1px solid var(--accent-green);
    color: var(--accent-green);
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 700;
    z-index: 100;
    transition: transform 0.3s;
    box-shadow: 0 8px 24px rgba(0,255,136,0.2);
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  .toast.error {
    border-color: var(--accent-pink);
    color: var(--accent-pink);
  }

  /* 순위표 */
  .rank-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .rank-item {
    display: grid;
    grid-template-columns: 50px 1fr auto;
    align-items: center;
    padding: 14px 16px;
    background: var(--bg-primary);
    border-radius: 10px;
    border: 1px solid var(--border);
    transition: all 0.2s;
  }

  .rank-item.top1 {
    border-color: var(--accent-yellow);
    background: linear-gradient(135deg, rgba(255,212,0,0.15), rgba(255,212,0,0.02));
  }

  .rank-item.top2 {
    border-color: rgba(192,192,192,0.5);
    background: linear-gradient(135deg, rgba(192,192,192,0.1), rgba(192,192,192,0.02));
  }

  .rank-item.top3 {
    border-color: rgba(205,127,50,0.6);
    background: linear-gradient(135deg, rgba(205,127,50,0.1), rgba(205,127,50,0.02));
  }

  .rank-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    text-align: center;
    color: var(--text-secondary);
  }

  .rank-item.top1 .rank-num { color: var(--accent-yellow); }
  .rank-item.top2 .rank-num { color: #c0c0c0; }
  .rank-item.top3 .rank-num { color: #cd7f32; }

  .rank-name {
    font-weight: 700;
    font-size: 15px;
  }

  .rank-meta {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .rank-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--accent-cyan);
    letter-spacing: 1px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-secondary);
  }

  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  /* 내 기록 */
  .history-item {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 12px 14px;
    background: var(--bg-primary);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .history-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    color: var(--text-secondary);
    letter-spacing: 1px;
  }

  .history-type {
    font-weight: 700;
    font-size: 14px;
  }

  .history-points {
    font-family: 'Bebas Neue', sans-serif;
    color: var(--accent-yellow);
    font-size: 18px;
  }

  /* 통계 */
  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .stat-box {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent-cyan);
  }

  /* 안내 박스 */
  .info-box {
    background: linear-gradient(135deg, rgba(0,240,255,0.08), rgba(0,240,255,0.02));
    border: 1px solid rgba(0,240,255,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .info-box strong {
    color: var(--accent-cyan);
  }

  /* 페이지 전환 */
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.3s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 새로고침 */
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    margin-left: auto;
    display: block;
    margin-bottom: 12px;
  }

  /* 푸터 */
  .footer {
    text-align: center;
    padding: 20px 0;
    color: var(--text-secondary);
    font-size: 11px;
    line-height: 1.6;
  }

  .footer-heart {
    color: var(--accent-pink);
  }
</style>
</head>
<body>
<div class="container">
  
  <!-- 헤더 -->
  <div class="header">
    <span class="header-tag">MAY 2026 CHALLENGE</span>
    <h1>바람의 라이더</h1>
    <h2>🚴 내가 제일 잘 나가 🚴</h2>
    <div class="header-deco"></div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab active" onclick="showPage('input')">📝 점수 입력</button>
    <button class="tab" onclick="showPage('rank')">🏆 순위표</button>
  </div>

  <!-- 페이지: 점수 입력 -->
  <div class="page active" id="page-input">
    
    <div class="info-box">
      💝 <strong>조피디님 찬조</strong>로 진행되는 5월 라이딩 챌린지!<br>
      라이딩 후 양심껏 점수 입력해 주세요. 화이팅 🚴‍♂️💨
    </div>

    <div class="card">
      <h3 class="card-title">닉네임</h3>
      <div class="input-group">
        <input type="text" class="text-input" id="nickname" placeholder="예: 한니발 / 스틸 / 나연파더" maxlength="20">
      </div>
    </div>

    <div class="card">
      <h3 class="card-title">라이딩 종류</h3>
      <div class="score-grid">
        <button class="score-btn" data-type="새라" data-points="1">
          <div class="score-btn-name">새라</div>
          <div class="score-btn-desc">월~금 출근/새벽</div>
          <div class="score-btn-points">1.0 PT</div>
        </button>
        <button class="score-btn" data-type="야라" data-points="1.5">
          <div class="score-btn-name">야라</div>
          <div class="score-btn-desc">화·목 야간</div>
          <div class="score-btn-points">1.5 PT</div>
        </button>
        <button class="score-btn" data-type="주라(100km미만)" data-points="1.5">
          <div class="score-btn-name">주라 短</div>
          <div class="score-btn-desc">100km 미만</div>
          <div class="score-btn-points">1.5 PT</div>
        </button>
        <button class="score-btn" data-type="주라(100km이상)" data-points="2">
          <div class="score-btn-name">주라 長</div>
          <div class="score-btn-desc">100km 이상</div>
          <div class="score-btn-points">2.0 PT</div>
        </button>
      </div>
    </div>

    <div class="card">
      <h3 class="card-title">라이딩 날짜</h3>
      <div class="input-group">
        <input type="date" class="date-input" id="ride-date" min="2026-05-01" max="2026-05-31">
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitScore()">
      🚴 점수 등록하기
    </button>

  </div>

  <!-- 페이지: 순위표 -->
  <div class="page" id="page-rank">
    
    <div class="card">
      <h3 class="card-title">실시간 순위</h3>
      <button class="refresh-btn" onclick="loadRanking()">🔄 새로고침</button>
      <div class="rank-list" id="rank-list">
        <div class="empty-state">
          <div class="empty-state-icon">🚴</div>
          <div>아직 등록된 라이딩이 없습니다</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 class="card-title">내 기록</h3>
      <div class="input-group">
        <input type="text" class="text-input" id="search-nick" placeholder="닉네임 입력하면 내 이력이 보여요">
      </div>
      <div class="stat-row" id="my-stats" style="display:none">
        <div class="stat-box">
          <div class="stat-label">총 점수</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">라이딩</div>
          <div class="stat-value" id="stat-count">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">순위</div>
          <div class="stat-value" id="stat-rank">-</div>
        </div>
      </div>
      <div id="my-history"></div>
    </div>

  </div>

  <!-- 푸터 -->
  <div class="footer">
    Made with <span class="footer-heart">♥</span> for 바람의 라이더<br>
    조피디님 감사합니다 🙏
  </div>

</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
  // ====== 설정: 강철님이 직접 수정할 부분 ======
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfuEyOzgD0w0ZxJQtGUXg3joiCLG_JinfGcBWZwxZ8AiGWJJ-mwzPF_Oh0mNJvj7Vj/exec';
  // ============================================

  // 오늘 날짜 기본값 (챌린지 기간 5/1~5/31 범위 내로 자동 보정)
  const CHALLENGE_START = '2026-05-01';
  const CHALLENGE_END = '2026-05-31';
  const today = new Date().toISOString().split('T')[0];
  let defaultDate;
  if (today < CHALLENGE_START) {
    defaultDate = CHALLENGE_START;
  } else if (today > CHALLENGE_END) {
    defaultDate = CHALLENGE_END;
  } else {
    defaultDate = today;
  }
  document.getElementById('ride-date').value = defaultDate;

  // 점수 버튼 선택
  let selectedType = null;
  let selectedPoints = 0;

  document.querySelectorAll('.score-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedType = btn.dataset.type;
      selectedPoints = parseFloat(btn.dataset.points);
    });
  });

  // 페이지 전환
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'rank') loadRanking();
  }

  // 토스트
  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => toast.className = 'toast', 2500);
  }

  // 점수 등록
  async function submitScore() {
    const nickname = document.getElementById('nickname').value.trim();
    const date = document.getElementById('ride-date').value;

    if (!nickname) {
      showToast('닉네임을 입력해 주세요', true);
      return;
    }
    if (!selectedType) {
      showToast('라이딩 종류를 선택해 주세요', true);
      return;
    }
    if (!date) {
      showToast('날짜를 입력해 주세요', true);
      return;
    }
    if (date < CHALLENGE_START || date > CHALLENGE_END) {
      showToast('챌린지 기간(5/1~5/31)만 입력 가능합니다', true);
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '⏳ 등록 중...';

    try {
      // POST는 CORS 문제가 있을 수 있으므로 GET 파라미터로 전송
      const params = new URLSearchParams({
        action: 'add',
        nickname: nickname,
        type: selectedType,
        points: selectedPoints,
        date: date
      });

      await fetch(APPS_SCRIPT_URL + '?' + params.toString(), {
        method: 'GET',
        mode: 'no-cors'
      });

      showToast(`✓ ${nickname}님 ${selectedPoints}점 등록 완료!`);
      
      // 초기화
      document.getElementById('nickname').value = nickname; // 닉네임은 유지
      document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
      selectedType = null;
      selectedPoints = 0;

    } catch (err) {
      showToast('등록 실패. 다시 시도해 주세요', true);
    } finally {
      btn.disabled = false;
      btn.textContent = '🚴 점수 등록하기';
    }
  }

  // 순위 로드
  async function loadRanking() {
    try {
      const res = await fetch(APPS_SCRIPT_URL + '?action=ranking');
      const data = await res.json();
      renderRanking(data);
    } catch (err) {
      document.getElementById('rank-list').innerHTML = 
        '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div>데이터를 불러올 수 없습니다</div></div>';
    }
  }

  function renderRanking(data) {
    const list = document.getElementById('rank-list');
    if (!data || data.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🚴</div><div>아직 등록된 라이딩이 없습니다</div></div>';
      return;
    }

    list.innerHTML = data.map((item, i) => {
      const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
      const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1);
      return `
        <div class="rank-item ${rankClass}">
          <div class="rank-num">${medal}</div>
          <div>
            <div class="rank-name">${escapeHtml(item.nickname)}</div>
            <div class="rank-meta">${item.count}회 라이딩</div>
          </div>
          <div class="rank-score">${item.total}<span style="font-size:14px;color:var(--text-secondary)"> PT</span></div>
        </div>
      `;
    }).join('');
  }

  // 내 기록 검색
  document.getElementById('search-nick').addEventListener('input', debounce(async (e) => {
    const nick = e.target.value.trim();
    if (!nick) {
      document.getElementById('my-stats').style.display = 'none';
      document.getElementById('my-history').innerHTML = '';
      return;
    }
    try {
      const res = await fetch(APPS_SCRIPT_URL + '?action=mine&nickname=' + encodeURIComponent(nick));
      const data = await res.json();
      renderMyHistory(data, nick);
    } catch (err) {}
  }, 400));

  function renderMyHistory(data, nick) {
    const stats = document.getElementById('my-stats');
    const hist = document.getElementById('my-history');

    if (!data || !data.records || data.records.length === 0) {
      stats.style.display = 'none';
      hist.innerHTML = '<div class="empty-state" style="padding:20px"><div>등록된 기록이 없습니다</div></div>';
      return;
    }

    stats.style.display = 'grid';
    document.getElementById('stat-total').textContent = data.total;
    document.getElementById('stat-count').textContent = data.records.length;
    document.getElementById('stat-rank').textContent = data.rank ? data.rank + '위' : '-';

    hist.innerHTML = data.records.map(r => `
      <div class="history-item">
        <div class="history-date">${formatDate(r.date)}</div>
        <div class="history-type">${escapeHtml(r.type)}</div>
        <div class="history-points">+${r.points}</div>
      </div>
    `).join('');
  }

  function formatDate(d) {
    const date = new Date(d);
    return `${date.getMonth()+1}/${date.getDate()}`;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function debounce(fn, delay) {
    let t;
    return (...args) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...args), delay);
    };
  }
</script>
</body>
</html>
